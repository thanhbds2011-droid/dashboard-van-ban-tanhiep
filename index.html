<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Điều hành văn bản</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --main: #1f5f99;
      --main2: #2f80c0;
      --bg: #f3f7fb;
      --card: #ffffff;
      --red: #e76f51;
      --orange: #f4a261;
      --blue: #5dade2;
      --green: #4f8a6d;
      --gray: #7b8490;
      --text: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--main), var(--main2));
      color: white;
      padding: 18px 14px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }

    header h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
    }

    header p {
      margin: 7px 0 0;
      font-size: 13px;
      opacity: 0.95;
      line-height: 1.4;
    }

    .container {
      max-width: 1180px;
      margin: auto;
      padding: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tab-btn {
      border: none;
      padding: 13px 10px;
      border-radius: 14px;
      background: white;
      color: var(--main);
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .tab-btn.active {
      background: var(--main);
      color: white;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px 10px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border-left: 5px solid var(--main);
    }

    .card .number {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .card .label {
      font-size: 13px;
      color: #555;
      font-weight: bold;
      line-height: 1.3;
    }

    .red { color: var(--red); }
    .orange { color: var(--orange); }
    .blue { color: var(--blue); }
    .green { color: var(--green); }
    .gray { color: var(--gray); }

    .chart-box {
      background: var(--card);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .chart-box h3 {
      margin: 0 0 10px;
      color: var(--main);
      font-size: 17px;
    }

    .chart-wide {
      width: 100%;
      height: 260px !important;
    }

    .filters {
      background: var(--card);
      padding: 14px;
      border-radius: 18px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      display: grid;
      grid-template-columns: 1fr 240px 220px;
      gap: 10px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d7dce2;
      border-radius: 13px;
      font-size: 14px;
      outline: none;
      background: white;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 18px 0 10px;
      color: var(--main);
    }

    .table-wrap {
      background: var(--card);
      border-radius: 18px;
      overflow-x: auto;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
    }

    th {
      background: var(--main);
      color: white;
      padding: 12px;
      text-align: left;
      font-size: 14px;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
      font-size: 14px;
    }

    tr:hover {
      background: #eef6ff;
      cursor: pointer;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      color: white;
      font-weight: bold;
      font-size: 12px;
      white-space: nowrap;
    }

    .badge-red { background: var(--red); }
    .badge-orange { background: var(--orange); }
    .badge-blue { background: var(--blue); }
    .badge-green { background: var(--green); }
    .badge-gray { background: var(--gray); }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: var(--main2);
      color: white;
      padding: 8px 11px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: bold;
    }

    .mobile-list { display: none; }

    .mobile-card {
      background: white;
      border-radius: 18px;
      padding: 15px;
      margin-bottom: 13px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border-left: 5px solid var(--main);
    }

    .mobile-card h3 {
      margin: 0 0 9px;
      font-size: 17px;
      color: var(--main);
      line-height: 1.35;
    }

    .mobile-card p {
      margin: 7px 0;
      font-size: 14.5px;
      line-height: 1.45;
    }

    .pagination {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0;
    }

    .pagination button {
      border: none;
      background: white;
      color: var(--main);
      padding: 9px 13px;
      border-radius: 10px;
      font-weight: bold;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      cursor: pointer;
    }

    .pagination button.active {
      background: var(--main);
      color: white;
    }

    .pagination button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 99;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      padding: 14px;
    }

    .modal-content {
      background: white;
      max-width: 760px;
      margin: 30px auto;
      border-radius: 18px;
      padding: 18px;
      max-height: 86vh;
      overflow-y: auto;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .modal-header h2 {
      margin: 0;
      color: var(--main);
      font-size: 19px;
    }

    .close {
      font-size: 28px;
      cursor: pointer;
      color: #555;
      font-weight: bold;
    }

    .detail-row {
      margin: 10px 0;
      line-height: 1.5;
    }

    .detail-row strong { color: var(--main); }

    .ai-detail {
      white-space: pre-wrap;
      background: #f7f9fc;
      padding: 12px;
      border-radius: 12px;
      border-left: 4px solid var(--main2);
      line-height: 1.55;
    }

    .loading {
      text-align: center;
      padding: 26px;
      font-weight: bold;
      color: var(--main);
    }

    .footer {
      text-align: center;
      color: #777;
      padding: 24px;
      font-size: 13px;
    }

    @media (max-width: 850px) {
      header {
        padding: 16px 14px;
        position: relative;
      }

      header h1 {
        font-size: 18px;
      }

      header p {
        font-size: 13px;
      }

      .container {
        padding: 12px;
      }

      .tabs {
        grid-template-columns: 1fr 1fr;
      }

      .cards {
        grid-template-columns: 1fr 1fr;
      }

      .card {
        padding: 14px 8px;
        border-left: 5px solid var(--main);
      }

      .card .number {
        font-size: 28px;
      }

      .card .label {
        font-size: 13px;
      }

      .chart-wide {
        height: 230px !important;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .table-wrap {
        display: none;
      }

      .mobile-list {
        display: block;
      }

      .modal-content {
        margin: 20px auto;
        padding: 16px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>📑 HỆ THỐNG NHẮC VIỆC VĂN BẢN</h1>
  <p>Dashboard giám sát, nhắc việc và lưu trữ kết quả thực hiện nhiệm vụ</p>
</header>

<div class="container">

  <div class="tabs">
    <button class="tab-btn active" id="btnTheoDoi" onclick="doiTab('theoDoi')">📌 Đang theo dõi</button>
    <button class="tab-btn" id="btnLuuTru" onclick="doiTab('luuTru')">📁 Lưu trữ</button>
  </div>

  <div class="cards" id="khuThongKe"></div>

  <div class="chart-box" id="khuBieuDo">
    <h3>🏢 Biểu đồ theo phòng ban</h3>
    <canvas id="chartPhongBan" class="chart-wide"></canvas>
  </div>

  <div class="filters">
    <input type="text" id="tuKhoa" placeholder="🔍 Tìm số hiệu, trích yếu..." oninput="hienThiDuLieu()">

    <select id="locPhong" onchange="hienThiDuLieu()">
      <option value="">Tất cả phòng ban</option>
      <option value="PHÒNG TỔ CHỨC - HÀNH CHÍNH">Phòng Tổ chức - Hành chính</option>
      <option value="PHÒNG KẾ HOẠCH TÀI CHÍNH">Phòng Kế hoạch tài chính</option>
      <option value="PHÒNG CÔNG TÁC XÃ HỘI">Phòng Công tác xã hội</option>
      <option value="PHÒNG Y TẾ">Phòng Y tế</option>
      <option value="KHU I">Khu I</option>
      <option value="KHU II">Khu II</option>
      <option value="KHU III">Khu III</option>
    </select>

    <select id="locTrangThai" onchange="hienThiDuLieu()">
      <option value="">Tất cả trạng thái</option>
      <option value="QUÁ HẠN">Quá hạn</option>
      <option value="ĐẾN HẠN HÔM NAY">Đến hạn hôm nay</option>
      <option value="SẮP ĐẾN HẠN">Sắp đến hạn</option>
      <option value="CÒN HẠN">Còn hạn</option>
      <option value="HOÀN THÀNH ĐÚNG HẠN">Hoàn thành đúng hạn</option>
      <option value="HOÀN THÀNH TRỄ HẠN">Hoàn thành trễ hạn</option>
    </select>
  </div>

  <div class="section-title" id="tieuDeBang">📌 Danh sách văn bản đang theo dõi</div>

  <div class="table-wrap">
    <table>
      <thead id="theadBang"></thead>
      <tbody id="bangDuLieu">
        <tr><td colspan="8" class="loading">Đang tải dữ liệu...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="mobile-list" id="mobileList">
    <div class="loading">Đang tải dữ liệu...</div>
  </div>

  <div id="phanTrang" class="pagination"></div>

</div>

<div class="footer">
  Trung tâm Bảo trợ xã hội Tân Hiệp - Dashboard chỉ xem dành cho Ban Giám đốc
</div>

<div id="modalChiTiet" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>📄 Chi tiết văn bản</h2>
      <span class="close" onclick="dongChiTiet()">&times;</span>
    </div>
    <div id="noiDungChiTiet"></div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyMINgn39Y_zlvdG9nqMpDH9KeoBKXnR_ueWr_wpVLPu82QxZVPSH4tnkVR9oa7eTJ2KQ/exec";

  const DANH_MUC_PHONG = [
    "PHÒNG TỔ CHỨC - HÀNH CHÍNH",
    "PHÒNG KẾ HOẠCH TÀI CHÍNH",
    "PHÒNG CÔNG TÁC XÃ HỘI",
    "PHÒNG Y TẾ",
    "KHU I",
    "KHU II",
    "KHU III"
  ];

  let duLieuTheoDoi = [];
  let duLieuLuuTru = [];
  let tabHienTai = "theoDoi";
  let chartPhongBan = null;

  let trangHienTai = 1;
  const SO_DONG_MOI_TRANG = 10;

  async function taiDuLieu() {
    try {
      const response = await fetch(API_URL);
      const data = await response.json();

      duLieuTheoDoi = data.dangTheoDoi || [];
      duLieuLuuTru = data.luuTru || [];

      hienThiDuLieu();

    } catch (error) {
      document.getElementById("bangDuLieu").innerHTML =
        '<tr><td colspan="8" class="loading red">Không tải được dữ liệu. Kiểm tra lại link Apps Script Web App.</td></tr>';
      document.getElementById("mobileList").innerHTML =
        '<div class="loading red">Không tải được dữ liệu.</div>';
      console.error(error);
    }
  }

  function doiTab(tab) {
    tabHienTai = tab;
    trangHienTai = 1;

    document.getElementById("btnTheoDoi").classList.toggle("active", tab === "theoDoi");
    document.getElementById("btnLuuTru").classList.toggle("active", tab === "luuTru");

    document.getElementById("tieuDeBang").textContent =
      tab === "theoDoi"
        ? "📌 Danh sách văn bản đang theo dõi"
        : "📁 Danh sách văn bản đã lưu trữ";

    document.getElementById("locTrangThai").style.display =
      tab === "theoDoi" ? "block" : "none";

    hienThiDuLieu();
  }

  function layDuLieuHienTai() {
    return tabHienTai === "theoDoi" ? duLieuTheoDoi : duLieuLuuTru;
  }

  function hienThiDuLieu() {
    const dataHienTai = layDuLieuHienTai();

    const tuKhoa = document.getElementById("tuKhoa").value.toLowerCase().trim();
    const locPhong = document.getElementById("locPhong").value;
    const locTrangThai = document.getElementById("locTrangThai").value;

    const duLieuLoc = dataHienTai.filter(item => {
      const trangThai = tabHienTai === "theoDoi"
        ? tinhTrangThai(item.hanXuLy)
        : tinhTrangThaiLuuTru(item.hanXuLy, item.ngayHoanThanh);

      const textSearch = [
        item.soHieu,
        item.trichYeu,
        item.phongBan,
        item.goiYAI
      ].join(" ").toLowerCase();

      const dungTuKhoa = !tuKhoa || textSearch.includes(tuKhoa);
      const dungPhong = !locPhong || phongBanCoChua(item.phongBan, locPhong);
      const dungTrangThai = tabHienTai === "luuTru" || !locTrangThai || trangThai === locTrangThai;

      return dungTuKhoa && dungPhong && dungTrangThai;
    });

    capNhatThongKe();
    veBieuDoPhongBan();
    veDuLieuTheoTrang(duLieuLoc);
  }

  function capNhatThongKe() {
    const data = layDuLieuHienTai();

    if (tabHienTai === "luuTru") {
      document.getElementById("khuThongKe").innerHTML = `
        <div class="card">
          <div class="number green">${data.length}</div>
          <div class="label">Tổng văn bản lưu trữ</div>
        </div>
      `;
      return;
    }

    let tong = 0, quaHan = 0, denHan = 0, sapHan = 0, conHan = 0;

    data.forEach(item => {
      const tt = tinhTrangThai(item.hanXuLy);
      tong++;

      if (tt === "QUÁ HẠN") quaHan++;
      else if (tt === "ĐẾN HẠN HÔM NAY") denHan++;
      else if (tt === "SẮP ĐẾN HẠN") sapHan++;
      else if (tt === "CÒN HẠN") conHan++;
    });

    document.getElementById("khuThongKe").innerHTML = `
      <div class="card"><div class="number gray">${tong}</div><div class="label">Tổng văn bản</div></div>
      <div class="card"><div class="number red">${quaHan}</div><div class="label">Quá hạn</div></div>
      <div class="card"><div class="number orange">${denHan}</div><div class="label">Đến hạn hôm nay</div></div>
      <div class="card"><div class="number blue">${sapHan}</div><div class="label">Sắp đến hạn ≤ 5 ngày</div></div>
      <div class="card"><div class="number green">${conHan}</div><div class="label">Còn hạn</div></div>
    `;
  }

  function veBieuDoPhongBan() {
    const data = layDuLieuHienTai();
    const thongKePhong = {};

    DANH_MUC_PHONG.forEach(phong => thongKePhong[phong] = 0);

    data.forEach(item => {
      DANH_MUC_PHONG.forEach(phong => {
        if (phongBanCoChua(item.phongBan, phong)) {
          thongKePhong[phong]++;
        }
      });
    });

    if (chartPhongBan) chartPhongBan.destroy();

    chartPhongBan = new Chart(document.getElementById("chartPhongBan"), {
      type: "bar",
      data: {
        labels: Object.keys(thongKePhong),
        datasets: [{
          label: "Số văn bản",
          data: Object.values(thongKePhong),
          backgroundColor: "#5dade2",
          borderRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { precision: 0 } },
          x: { ticks: { font: { size: 11 } } }
        }
      }
    });
  }

  function veDuLieuTheoTrang(data) {
    const tongTrang = Math.ceil(data.length / SO_DONG_MOI_TRANG);
    if (trangHienTai > tongTrang) trangHienTai = tongTrang || 1;

    const batDau = (trangHienTai - 1) * SO_DONG_MOI_TRANG;
    const ketThuc = batDau + SO_DONG_MOI_TRANG;
    const dataTrang = data.slice(batDau, ketThuc);

    veBang(dataTrang, batDau);
    veMobile(dataTrang);
    vePhanTrang(data);
  }

  function veBang(data, batDau) {
    const thead = document.getElementById("theadBang");
    const tbody = document.getElementById("bangDuLieu");

    if (tabHienTai === "theoDoi") {
      thead.innerHTML = `
        <tr>
          <th>STT</th>
          <th>Số hiệu</th>
          <th>Trích yếu</th>
          <th>Phòng ban</th>
          <th>Hạn xử lý</th>
          <th>Trạng thái</th>
          <th>File</th>
        </tr>
      `;
    } else {
      thead.innerHTML = `
        <tr>
          <th>STT</th>
          <th>Dấu thời gian</th>
          <th>Số hiệu</th>
          <th>Trích yếu</th>
          <th>Phòng ban</th>
          <th>Hạn xử lý</th>
          <th>Ngày hoàn thành</th>
          <th>Kết quả</th>
        </tr>
      `;
    }

    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="loading">Không có dữ liệu phù hợp.</td></tr>';
      return;
    }

    let html = "";

    data.forEach((item, index) => {
      if (tabHienTai === "theoDoi") {
        const trangThai = tinhTrangThai(item.hanXuLy);
        const badgeClass = layMauTrangThai(trangThai);

        html += `
          <tr onclick="moChiTiet(${duLieuTheoDoi.indexOf(item)})">
            <td>${batDau + index + 1}</td>
            <td><strong>${safe(item.soHieu)}</strong></td>
            <td>${safe(item.trichYeu)}</td>
            <td>${safe(item.phongBan)}</td>
            <td>${dinhDangNgay(item.hanXuLy)}</td>
            <td><span class="badge ${badgeClass}">${trangThai}</span></td>
            <td onclick="event.stopPropagation()">${taoNutFile(item.file)}</td>
          </tr>
        `;
      } else {
        const ketQua = tinhTrangThaiLuuTru(item.hanXuLy, item.ngayHoanThanh);
        const badgeClass = layMauTrangThai(ketQua);

        html += `
          <tr>
            <td>${batDau + index + 1}</td>
            <td>${dinhDangNgayGio(item.dauThoiGian)}</td>
            <td><strong>${safe(item.soHieu)}</strong></td>
            <td>${safe(item.trichYeu)}</td>
            <td>${safe(item.phongBan)}</td>
            <td>${dinhDangNgay(item.hanXuLy)}</td>
            <td>${dinhDangNgayGio(item.ngayHoanThanh)}</td>
            <td><span class="badge ${badgeClass}">${ketQua}</span></td>
          </tr>
        `;
      }
    });

    tbody.innerHTML = html;
  }

  function veMobile(data) {
    const box = document.getElementById("mobileList");

    if (data.length === 0) {
      box.innerHTML = '<div class="loading">Không có dữ liệu phù hợp.</div>';
      return;
    }

    let html = "";

    data.forEach(item => {
      if (tabHienTai === "theoDoi") {
        const trangThai = tinhTrangThai(item.hanXuLy);
        const badgeClass = layMauTrangThai(trangThai);

        html += `
          <div class="mobile-card" onclick="moChiTiet(${duLieuTheoDoi.indexOf(item)})">
            <h3>${safe(item.soHieu)}</h3>
            <p><strong>Trích yếu:</strong> ${safe(item.trichYeu)}</p>
            <p><strong>Phòng:</strong> ${safe(item.phongBan)}</p>
            <p><strong>Hạn xử lý:</strong> ${dinhDangNgay(item.hanXuLy)}</p>
            <p><span class="badge ${badgeClass}">${trangThai}</span></p>
            <p onclick="event.stopPropagation()">${taoNutFile(item.file)}</p>
          </div>
        `;
      } else {
        const ketQua = tinhTrangThaiLuuTru(item.hanXuLy, item.ngayHoanThanh);
        const badgeClass = layMauTrangThai(ketQua);

        html += `
          <div class="mobile-card">
            <h3>${safe(item.soHieu)}</h3>
            <p><strong>Trích yếu:</strong> ${safe(item.trichYeu)}</p>
            <p><strong>Phòng:</strong> ${safe(item.phongBan)}</p>
            <p><strong>Hạn xử lý:</strong> ${dinhDangNgay(item.hanXuLy)}</p>
            <p><strong>Ngày hoàn thành:</strong> ${dinhDangNgayGio(item.ngayHoanThanh)}</p>
            <p><span class="badge ${badgeClass}">${ketQua}</span></p>
          </div>
        `;
      }
    });

    box.innerHTML = html;
  }

  function vePhanTrang(data) {
    const tongTrang = Math.ceil(data.length / SO_DONG_MOI_TRANG);
    const box = document.getElementById("phanTrang");

    if (tongTrang <= 1) {
      box.innerHTML = "";
      return;
    }

    let html = "";

    html += `<button onclick="doiTrang(${trangHienTai - 1})" ${trangHienTai === 1 ? "disabled" : ""}>‹ Trước</button>`;

    for (let i = 1; i <= tongTrang; i++) {
      html += `<button onclick="doiTrang(${i})" class="${i === trangHienTai ? "active" : ""}">${i}</button>`;
    }

    html += `<button onclick="doiTrang(${trangHienTai + 1})" ${trangHienTai === tongTrang ? "disabled" : ""}>Sau ›</button>`;

    box.innerHTML = html;
  }

  function doiTrang(trang) {
    const data = layDuLieuHienTai();
    const tongTrang = Math.ceil(data.length / SO_DONG_MOI_TRANG);
    if (trang < 1 || trang > tongTrang) return;
    trangHienTai = trang;
    hienThiDuLieu();
  }

  function moChiTiet(index) {
    const item = duLieuTheoDoi[index];
    const trangThai = tinhTrangThai(item.hanXuLy);
    const badgeClass = layMauTrangThai(trangThai);

    document.getElementById("noiDungChiTiet").innerHTML = `
      <div class="detail-row"><strong>Số hiệu:</strong> ${safe(item.soHieu)}</div>
      <div class="detail-row"><strong>Trích yếu:</strong> ${safe(item.trichYeu)}</div>
      <div class="detail-row"><strong>Phòng ban:</strong> ${safe(item.phongBan)}</div>
      <div class="detail-row"><strong>Hạn xử lý:</strong> ${dinhDangNgay(item.hanXuLy)}</div>
      <div class="detail-row"><strong>Trạng thái:</strong> <span class="badge ${badgeClass}">${trangThai}</span></div>
      <div class="detail-row"><strong>File đính kèm:</strong> ${taoNutFile(item.file)}</div>
      <div class="detail-row"><strong>Tóm tắt và gợi ý xử lý:</strong></div>
      <div class="ai-detail">${safe(item.goiYAI || "Chưa có nội dung tổng hợp.")}</div>
    `;

    document.getElementById("modalChiTiet").style.display = "block";
  }

  function dongChiTiet() {
    document.getElementById("modalChiTiet").style.display = "none";
  }

  window.onclick = function(event) {
    const modal = document.getElementById("modalChiTiet");
    if (event.target === modal) dongChiTiet();
  }

  function phongBanCoChua(giaTri, phongCanTim) {
    if (!giaTri || !phongCanTim) return false;
    return chuanHoa(giaTri).includes(chuanHoa(phongCanTim));
  }

  function chuanHoa(text) {
    return String(text || "")
      .toUpperCase()
      .replace(/\s+/g, " ")
      .trim();
  }

  function tinhTrangThai(hanXuLy) {
    if (!hanXuLy) return "CHƯA CÓ HẠN";

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const han = new Date(hanXuLy);
    if (isNaN(han)) return "CHƯA CÓ HẠN";

    han.setHours(0, 0, 0, 0);

    const diff = Math.round((han - today) / (1000 * 60 * 60 * 24));

    if (diff < 0) return "QUÁ HẠN";
    if (diff === 0) return "ĐẾN HẠN HÔM NAY";
    if (diff > 0 && diff <= 5) return "SẮP ĐẾN HẠN";
    return "CÒN HẠN";
  }

  function tinhTrangThaiLuuTru(hanXuLy, ngayHoanThanh) {
    const han = new Date(hanXuLy);
    const ht = new Date(ngayHoanThanh);

    if (isNaN(han) || isNaN(ht)) return "ĐÃ LƯU TRỮ";

    han.setHours(0, 0, 0, 0);
    ht.setHours(0, 0, 0, 0);

    if (ht.getTime() <= han.getTime()) return "HOÀN THÀNH ĐÚNG HẠN";
    return "HOÀN THÀNH TRỄ HẠN";
  }

  function layMauTrangThai(trangThai) {
    if (trangThai === "QUÁ HẠN" || trangThai === "HOÀN THÀNH TRỄ HẠN") return "badge-red";
    if (trangThai === "ĐẾN HẠN HÔM NAY") return "badge-orange";
    if (trangThai === "SẮP ĐẾN HẠN") return "badge-blue";
    if (trangThai === "CÒN HẠN" || trangThai === "HOÀN THÀNH ĐÚNG HẠN") return "badge-green";
    return "badge-gray";
  }

  function dinhDangNgay(value) {
    if (!value) return "";
    const d = new Date(value);
    if (isNaN(d)) return value;
    return d.toLocaleDateString("vi-VN");
  }

  function dinhDangNgayGio(value) {
    if (!value) return "";
    const d = new Date(value);
    if (isNaN(d)) return value;
    return d.toLocaleString("vi-VN");
  }

  function taoNutFile(link) {
    if (!link) return "";
    return `<a class="btn" href="${link}" target="_blank">📎 Mở file</a>`;
  }

  function safe(value) {
    if (!value) return "";
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  taiDuLieu();
</script>

</body>
</html>
