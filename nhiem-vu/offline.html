<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#17639a">
  <title>Đang ngoại tuyến</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#edf4fa;font-family:Arial,sans-serif;color:#173f5c}.card{max-width:520px;padding:28px;border-radius:20px;background:#fff;box-shadow:0 18px 50px rgba(19,63,92,.16);text-align:center}.icon{font-size:52px}h1{margin:14px 0 8px;font-size:24px}p{margin:0;line-height:1.6;color:#617989}button{margin-top:20px;padding:12px 20px;border:0;border-radius:12px;background:#17639a;color:#fff;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">📡</div>
    <h1>Thiết bị đang ngoại tuyến</h1>
    <p>Hãy kiểm tra kết nối Internet, sau đó mở lại ứng dụng để tải dữ liệu nhiệm vụ mới nhất.</p>
    <button type="button" onclick="location.reload()">Thử tải lại</button>
  </main>
</body>
</html>
