<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>Đăng ký thiết bị</title>

  <meta
    http-equiv="Cache-Control"
    content="no-cache, no-store, must-revalidate"
  >
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link
    rel="manifest"
    href="/dashboard-van-ban-tanhiep/manifest.json?v=20260710.1"
  >

  <link
    rel="apple-touch-icon"
    href="/dashboard-van-ban-tanhiep/icon-192.png"
  >

  <meta name="theme-color" content="#1f5f99">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Nhắc việc">
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  >

  <style>
    :root {
      --main: #1f5f99;
      --main-dark: #174b7b;
      --main-light: #2f80c0;
      --text: #1f2937;
      --muted: #5b6472;
      --border: #d7dce2;
      --success: #28704f;
      --success-bg: #e8f5ee;
      --success-border: #b7dfc6;
      --danger: #d9534f;
      --danger-bg: #fff1ed;
      --danger-border: #f5c2b5;
      --info-bg: #eef6ff;
      --info-border: #cfe5fa;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(
          circle at top right,
          rgba(255, 255, 255, 0.12),
          transparent 32%
        ),
        linear-gradient(135deg, var(--main-dark), var(--main-light));
      color: var(--text);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(18px, env(safe-area-inset-top))
        18px
        max(18px, env(safe-area-inset-bottom));
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(
        135deg,
        var(--main),
        var(--main-light)
      );
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 32px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      color: var(--main);
      font-size: 25px;
      line-height: 1.35;
      font-weight: 800;
    }

    .description {
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
      margin: 10px 0 18px;
    }

    label {
      display: block;
      font-weight: 800;
      color: var(--main);
      margin-bottom: 8px;
    }

    textarea {
      display: block;
      width: 100%;
      height: 56px;
      min-height: 56px;
      max-height: 56px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      font-family: inherit;
      font-size: 20px;
      line-height: 26px;
      outline: none;
      background: #ffffff;
      color: #111827;
      text-transform: uppercase;
      resize: none;
      overflow: hidden;
      -webkit-appearance: none;
      appearance: none;
    }

    textarea:focus {
      border-color: var(--main-light);
      box-shadow: 0 0 0 3px rgba(47, 128, 192, 0.13);
    }

    textarea::placeholder {
      color: #9ca3af;
    }

    button {
      width: 100%;
      min-height: 52px;
      margin-top: 16px;
      border: none;
      border-radius: 15px;
      padding: 14px 16px;
      background: var(--main);
      color: #ffffff;
      font-family: inherit;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition:
        opacity 0.2s ease,
        transform 0.2s ease,
        background 0.2s ease;
    }

    button:active:not(:disabled) {
      transform: scale(0.99);
    }

    button:disabled {
      opacity: 0.62;
      cursor: not-allowed;
    }

    .user-preview {
      display: none;
      margin-top: 14px;
      padding: 13px 14px;
      border-radius: 14px;
      background: #f7faff;
      border: 1px solid #d9e8f7;
      line-height: 1.5;
    }

    .user-preview.show {
      display: block;
    }

    .user-name {
      color: var(--main);
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .user-meta {
      color: #4b5563;
      font-size: 14px;
    }

    .note {
      background: #f3f7fb;
      border-left: 4px solid var(--main-light);
      border-radius: 13px;
      padding: 12px;
      margin-top: 14px;
      font-size: 13.5px;
      line-height: 1.5;
      color: #374151;
    }

    .msg {
      margin-top: 14px;
      padding: 13px;
      border-radius: 13px;
      font-weight: 750;
      line-height: 1.45;
      display: none;
    }

    .msg.show {
      display: block;
    }

    .msg.ok {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid var(--success-border);
    }

    .msg.err {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-border);
    }

    .msg.info {
      background: var(--info-bg);
      color: var(--main);
      border: 1px solid var(--info-border);
    }

    @media (max-width: 480px) {
      body {
        align-items: center;
        padding-left: 16px;
        padding-right: 16px;
      }

      .card {
        padding: 22px;
        border-radius: 22px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <main class="card">
    <div class="logo" aria-hidden="true">📑</div>

    <h1>Đăng ký thiết bị</h1>

    <p class="description">
      Nhập mã nhân sự để hệ thống xác định đúng người dùng,
      phòng ban và thiết bị nhận thông báo.
    </p>

    <label for="maNhanSu">Mã nhân sự</label>

    <textarea
      id="maNhanSu"
      name="maNhanSu"
      rows="1"
      maxlength="30"
      placeholder="Ví dụ: NV001"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="characters"
      spellcheck="false"
      enterkeyhint="done"
    ></textarea>

    <div id="userPreview" class="user-preview">
      <div id="userName" class="user-name"></div>
      <div id="userMeta" class="user-meta"></div>
    </div>

    <button id="btnDangKy" type="button" disabled>
      Đang kết nối hệ thống...
    </button>

    <div class="note">
      Trên iPhone: mở bằng Safari → Chia sẻ →
      Thêm vào Màn hình chính → mở từ biểu tượng ứng dụng → đăng ký.
    </div>

    <div id="msg" class="msg info show">
      Đang tải hệ thống thông báo...
    </div>
  </main>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbyMINgn39Y_zlvdG9nqMpDH9KeoBKXnR_ueWr_wpVLPu82QxZVPSH4tnkVR9oa7eTJ2KQ/exec";

    const DASHBOARD_URL =
      "/dashboard-van-ban-tanhiep/index.html";

    const ONESIGNAL_APP_ID =
      "1a1d8e66-d523-4a9a-84be-1d3c248bad61";

    const ONESIGNAL_SAFARI_WEB_ID =
      "web.onesignal.auto.12e0c5f3-6b76-47bb-8015-fa3026009bd5";

    const STORAGE = {
      externalId: "nhac_viec_van_ban_external_id",
      daDangKy: "nhac_viec_da_dang_ky_nhan_su",
      maNhanSu: "nhac_viec_ma_nhan_su",
      hoTen: "nhac_viec_ho_ten",
      phong: "nhac_viec_phong",
      vaiTro: "nhac_viec_vai_tro",
      subscriptionId: "nhac_viec_subscription_id",
      ngayDangKy: "nhac_viec_ngay_dang_ky"
    };

    const SDK_TIMEOUT_MS = 15000;
    const JSONP_TIMEOUT_MS = 15000;
    const SUBSCRIPTION_TIMEOUT_MS = 20000;

    let OneSignalRef = null;
    let oneSignalReady = false;
    let dangXuLy = false;
    let nhanSuDaXacThuc = null;

    const btn = document.getElementById("btnDangKy");
    const inputMa = document.getElementById("maNhanSu");
    const msg = document.getElementById("msg");
    const userPreview = document.getElementById("userPreview");
    const userName = document.getElementById("userName");
    const userMeta = document.getElementById("userMeta");

    function chuanHoaMaNhanSu(value) {
      return String(value || "")
        .toUpperCase()
        .replace(/\s+/g, "")
        .replace(/[^A-Z0-9_-]/g, "")
        .trim();
    }

    function hienThongBao(text, type) {
      msg.textContent = text;
      msg.className = "msg show " + (type || "info");
    }

    function capNhatNut(text, disabled) {
      btn.textContent = text;
      btn.disabled = Boolean(disabled);
    }

    function hienNhanSu(nhanSu) {
      if (!nhanSu) {
        userPreview.classList.remove("show");
        userName.textContent = "";
        userMeta.textContent = "";
        return;
      }

      userName.textContent =
        (nhanSu.ma || "") + " — " + (nhanSu.hoTen || "");

      userMeta.textContent =
        [nhanSu.phong, nhanSu.vaiTro]
          .filter(Boolean)
          .join(" • ");

      userPreview.classList.add("show");
    }

    function taoExternalId() {
      let id = localStorage.getItem(STORAGE.externalId);

      if (!id) {
        id =
          "vanban_" +
          Date.now() +
          "_" +
          Math.random().toString(36).slice(2, 12);

        localStorage.setItem(STORAGE.externalId, id);
      }

      return id;
    }

    function laIPhoneHoacIPad() {
      const ua = navigator.userAgent || "";

      return (
        /iPad|iPhone|iPod/.test(ua) ||
        (
          navigator.platform === "MacIntel" &&
          navigator.maxTouchPoints > 1
        )
      );
    }

    function daMoTuManHinhChinh() {
      return (
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true
      );
    }

    function goiJsonp(params) {
      return new Promise(function(resolve, reject) {
        const callbackName =
          "__jsonp_" +
          Date.now() +
          "_" +
          Math.random().toString(36).slice(2, 9);

        const script = document.createElement("script");

        let daKetThuc = false;

        function donDep() {
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }

          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }
        }

        const timeoutId = window.setTimeout(function() {
          if (daKetThuc) return;

          daKetThuc = true;
          donDep();

          reject(
            new Error(
              "Hệ thống xác thực phản hồi quá lâu."
            )
          );
        }, JSONP_TIMEOUT_MS);

        window[callbackName] = function(data) {
          if (daKetThuc) return;

          daKetThuc = true;
          window.clearTimeout(timeoutId);
          donDep();
          resolve(data);
        };

        const search = new URLSearchParams();

        Object.keys(params || {}).forEach(function(key) {
          const value = params[key];

          if (
            value !== undefined &&
            value !== null
          ) {
            search.set(key, String(value));
          }
        });

        search.set("callback", callbackName);
        search.set("_t", String(Date.now()));

        script.src =
          API_URL + "?" + search.toString();

        script.async = true;

        script.onerror = function() {
          if (daKetThuc) return;

          daKetThuc = true;
          window.clearTimeout(timeoutId);
          donDep();

          reject(
            new Error(
              "Không kết nối được hệ thống xác thực."
            )
          );
        };

        document.head.appendChild(script);
      });
    }

    async function kiemTraNhanSu(maNhanSu) {
      const result = await goiJsonp({
        action: "kiem_tra_nhan_su",
        ma: maNhanSu
      });

      if (!result || result.ok !== true) {
        throw new Error(
          result && result.message
            ? result.message
            : "Mã nhân sự không tồn tại."
        );
      }

      return result.nhanSu;
    }

    function layTrangThaiSubscription(OneSignal) {
      return {
        id:
          OneSignal.User.PushSubscription.id ||
          "",
        token:
          OneSignal.User.PushSubscription.token ||
          "",
        optedIn:
          OneSignal.User.PushSubscription.optedIn === true
      };
    }

    function choDenKhiSubscriptionSanSang(OneSignal) {
      return new Promise(function(resolve, reject) {
        let daKetThuc = false;

        const hienTai =
          layTrangThaiSubscription(OneSignal);

        if (hienTai.id && hienTai.optedIn) {
          resolve(hienTai);
          return;
        }

        function donDep() {
          try {
            OneSignal.User.PushSubscription
              .removeEventListener(
                "change",
                handler
              );
          } catch (e) {}
        }

        function handler() {
          if (daKetThuc) return;

          const moi =
            layTrangThaiSubscription(OneSignal);

          if (moi.id && moi.optedIn) {
            daKetThuc = true;
            window.clearTimeout(timeoutId);
            donDep();
            resolve(moi);
          }
        }

        OneSignal.User.PushSubscription
          .addEventListener(
            "change",
            handler
          );

        const timeoutId =
          window.setTimeout(function() {
            if (daKetThuc) return;

            const lanCuoi =
              layTrangThaiSubscription(OneSignal);

            if (lanCuoi.id && lanCuoi.optedIn) {
              daKetThuc = true;
              donDep();
              resolve(lanCuoi);
              return;
            }

            daKetThuc = true;
            donDep();

            reject(
              new Error(
                "Chưa tạo được mã nhận thông báo."
              )
            );
          }, SUBSCRIPTION_TIMEOUT_MS);
      });
    }

    async function dangKyThietBiTrenMayChu(
      maNhanSu,
      externalId,
      subscriptionId
    ) {
      const result = await goiJsonp({
        action: "dang_ky_thiet_bi_jsonp",
        ma: maNhanSu,
        externalId: externalId,
        subscriptionId: subscriptionId
      });

      if (!result || result.ok !== true) {
        throw new Error(
          result && result.message
            ? result.message
            : "Không đăng ký được thiết bị."
        );
      }

      return result;
    }

    function luuDangKy(result, subscriptionId) {
      const nhanSu = result.nhanSu || nhanSuDaXacThuc || {};

      localStorage.setItem(
        STORAGE.daDangKy,
        "1"
      );

      localStorage.setItem(
        STORAGE.maNhanSu,
        nhanSu.ma || chuanHoaMaNhanSu(inputMa.value)
      );

      localStorage.setItem(
        STORAGE.hoTen,
        nhanSu.hoTen || ""
      );

      localStorage.setItem(
        STORAGE.phong,
        nhanSu.phong || ""
      );

      localStorage.setItem(
        STORAGE.vaiTro,
        nhanSu.vaiTro || ""
      );

      localStorage.setItem(
        STORAGE.subscriptionId,
        subscriptionId || ""
      );

      localStorage.setItem(
        STORAGE.ngayDangKy,
        new Date().toISOString()
      );
    }

    async function dangKyThietBi() {
      if (dangXuLy) return;

      const maNhanSu =
        chuanHoaMaNhanSu(inputMa.value);

      inputMa.value = maNhanSu;

      if (!maNhanSu) {
        hienNhanSu(null);
        hienThongBao(
          "Vui lòng nhập mã nhân sự.",
          "err"
        );

        inputMa.focus();
        return;
      }

      if (!oneSignalReady || !OneSignalRef) {
        hienThongBao(
          "Hệ thống thông báo chưa sẵn sàng. Vui lòng tải lại ứng dụng.",
          "err"
        );
        return;
      }

      if (
        laIPhoneHoacIPad() &&
        !daMoTuManHinhChinh()
      ) {
        hienThongBao(
          "Trên iPhone/iPad, hãy thêm ứng dụng vào Màn hình chính rồi mở lại từ biểu tượng ứng dụng.",
          "err"
        );
        return;
      }

      dangXuLy = true;
      capNhatNut("Đang kiểm tra mã...", true);
      hienThongBao(
        "Đang xác thực mã nhân sự...",
        "info"
      );

      try {
        nhanSuDaXacThuc =
          await kiemTraNhanSu(maNhanSu);

        hienNhanSu(nhanSuDaXacThuc);

        hienThongBao(
          "Đã xác thực " +
            (nhanSuDaXacThuc.hoTen || maNhanSu) +
            ". Đang thiết lập thông báo...",
          "info"
        );

        capNhatNut(
          "Đang thiết lập thông báo...",
          true
        );

        await OneSignalRef.Notifications
          .requestPermission(true);

        const permission =
          typeof Notification !== "undefined"
            ? Notification.permission
            : "unknown";

        if (
          permission === "denied"
        ) {
          throw new Error(
            "Quyền thông báo đang bị từ chối. Hãy bật lại trong Cài đặt của thiết bị."
          );
        }

        await OneSignalRef.User.PushSubscription
          .optIn();

        const subscription =
          await choDenKhiSubscriptionSanSang(
            OneSignalRef
          );

        const externalId = taoExternalId();

        await OneSignalRef.login(externalId);

        capNhatNut(
          "Đang lưu đăng ký...",
          true
        );

        const result =
          await dangKyThietBiTrenMayChu(
            maNhanSu,
            externalId,
            subscription.id
          );

        luuDangKy(
          result,
          subscription.id
        );

        hienThongBao(
          "✅ Đăng ký thành công cho " +
            (
              result.nhanSu &&
              result.nhanSu.hoTen
                ? result.nhanSu.hoTen
                : maNhanSu
            ) +
            ". Đang mở Dashboard...",
          "ok"
        );

        capNhatNut(
          "Đăng ký thành công",
          true
        );

        window.setTimeout(function() {
          window.location.replace(
            DASHBOARD_URL +
              "?v=20260710.1"
          );
        }, 1000);

      } catch (error) {
        console.error(
          "Lỗi đăng ký:",
          error
        );

        hienThongBao(
          error && error.message
            ? error.message
            : "Không đăng ký được thiết bị. Vui lòng thử lại.",
          "err"
        );

        capNhatNut(
          "Đăng ký thiết bị",
          false
        );

      } finally {
        dangXuLy = false;
      }
    }

    function napOneSignalSDK() {
      window.OneSignalDeferred =
        window.OneSignalDeferred || [];

      let daKhoiTao = false;

      const sdkTimeout =
        window.setTimeout(function() {
          if (daKhoiTao) return;

          capNhatNut(
            "Không thể kết nối",
            true
          );

          hienThongBao(
            "Chưa kết nối được hệ thống thông báo. Hãy kiểm tra mạng hoặc tải lại ứng dụng.",
            "err"
          );
        }, SDK_TIMEOUT_MS);

      window.OneSignalDeferred.push(
        async function(OneSignal) {
          try {
            OneSignalRef = OneSignal;

            await OneSignal.init({
              appId: ONESIGNAL_APP_ID,
              safari_web_id:
                ONESIGNAL_SAFARI_WEB_ID,

              serviceWorkerPath:
                "/dashboard-van-ban-tanhiep/OneSignalSDKWorker.js",

              serviceWorkerUpdaterPath:
                "/dashboard-van-ban-tanhiep/OneSignalSDKWorker.js",

              serviceWorkerParam: {
                scope:
                  "/dashboard-van-ban-tanhiep/"
              },

              notifyButton: {
                enable: false
              },

              welcomeNotification: {
                disable: true
              }
            });

            daKhoiTao = true;
            oneSignalReady = true;

            window.clearTimeout(
              sdkTimeout
            );

            capNhatNut(
              "Đăng ký thiết bị",
              false
            );

            hienThongBao(
              "Hệ thống đã sẵn sàng. Nhập mã nhân sự để đăng ký.",
              "ok"
            );

          } catch (error) {
            console.error(
              "Lỗi OneSignal:",
              error
            );

            oneSignalReady = false;

            window.clearTimeout(
              sdkTimeout
            );

            capNhatNut(
              "Không thể kết nối",
              true
            );

            hienThongBao(
              "Không khởi tạo được hệ thống thông báo. Vui lòng tải lại ứng dụng.",
              "err"
            );
          }
        }
      );

      const script =
        document.createElement("script");

      script.src =
        "https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js";

      script.defer = true;
      script.async = true;

      script.onerror = function() {
        window.clearTimeout(
          sdkTimeout
        );

        oneSignalReady = false;

        capNhatNut(
          "Không thể kết nối",
          true
        );

        hienThongBao(
          "Không tải được hệ thống thông báo. Hãy kiểm tra kết nối mạng hoặc chế độ chặn nội dung.",
          "err"
        );
      };

      document.head.appendChild(
        script
      );
    }

    inputMa.addEventListener(
      "input",
      function() {
        const value =
          chuanHoaMaNhanSu(
            inputMa.value
          );

        if (inputMa.value !== value) {
          inputMa.value = value;
        }

        nhanSuDaXacThuc = null;
        hienNhanSu(null);
      }
    );

    inputMa.addEventListener(
      "keydown",
      function(event) {
        if (event.key === "Enter") {
