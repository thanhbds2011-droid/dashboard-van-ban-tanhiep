<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Đăng ký thiết bị</title>

  <link rel="manifest" href="/dashboard-van-ban-tanhiep/manifest.json">
  <link rel="apple-touch-icon" href="/dashboard-van-ban-tanhiep/icon-192.png">

  <meta name="theme-color" content="#1f5f99">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Nhắc việc">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #174b7b, #2f80c0);
      color: #1f2937;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(0,0,0,.25);
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1f5f99, #2f80c0);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      color: #1f5f99;
      font-size: 24px;
      line-height: 1.35;
    }

    p {
      color: #5b6472;
      line-height: 1.55;
      font-size: 15px;
      margin: 10px 0 18px;
    }

    label {
      display: block;
      font-weight: 800;
      color: #1f5f99;
      margin-bottom: 7px;
    }

    textarea {
  width: 100%;
  height: 54px;
  border: 1px solid #d7dce2;
  border-radius: 14px;
  padding: 14px;
  font-size: 20px;
  outline: none;
  background: #fff;
  color: #111827;
  text-transform: uppercase;
  resize: none;
  overflow: hidden;
  -webkit-appearance: none;
  appearance: none;
}

textarea:focus {
  border-color: #2f80c0;
  box-shadow: 0 0 0 3px rgba(47,128,192,.13);
}

    button {
      width: 100%;
      margin-top: 16px;
      border: none;
      border-radius: 15px;
      padding: 15px;
      background: #1f5f99;
      color: white;
      font-weight: 850;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .note {
      background: #f3f7fb;
      border-left: 4px solid #2f80c0;
      border-radius: 13px;
      padding: 12px;
      margin-top: 14px;
      font-size: 13.5px;
      line-height: 1.5;
      color: #374151;
    }

    .msg {
      margin-top: 14px;
      padding: 13px;
      border-radius: 13px;
      font-weight: 750;
      line-height: 1.45;
      display: none;
    }

    .ok {
      display: block;
      background: #e8f5ee;
      color: #28704f;
      border: 1px solid #b7dfc6;
    }

    .err {
      display: block;
      background: #fff1ed;
      color: #d9534f;
      border: 1px solid #f5c2b5;
    }

    .info {
      display: block;
      background: #eef6ff;
      color: #1f5f99;
      border: 1px solid #cfe5fa;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="logo">📑</div>

  <h1>Đăng ký thiết bị</h1>
  <p>Nhập mã nhân sự để hệ thống xác định đúng người dùng, phòng ban và thiết bị nhận thông báo.</p>

  <label for="maNhanSu">Mã nhân sự</label>
  <textarea
  id="maNhanSu"
  name="maNhanSu"
  rows="1"
  placeholder="Ví dụ: NV001"
  autocomplete="off"
  autocorrect="off"
  autocapitalize="characters"
  spellcheck="false"
  enterkeyhint="done"
></textarea>
  <button id="btnDangKy" type="button" disabled>Đang kết nối hệ thống...</button>

  <div class="note">
    iPhone: mở bằng Safari → Thêm vào Màn hình chính → mở từ biểu tượng ngoài màn hình → đăng ký.
  </div>

  <div id="msg" class="msg info">Đang tải hệ thống thông báo...</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyMINgn39Y_zlvdG9nqMpDH9KeoBKXnR_ueWr_wpVLPu82QxZVPSH4tnkVR9oa7eTJ2KQ/exec";

const ONESIGNAL_APP_ID = "1a1d8e66-d523-4a9a-84be-1d3c248bad61";
const ONESIGNAL_SAFARI_WEB_ID = "web.onesignal.auto.12e0c5f3-6b76-47bb-8015-fa3026009bd5";

const KEY_EXTERNAL_ID = "nhac_viec_van_ban_external_id";
const KEY_DA_DANG_KY = "nhac_viec_da_dang_ky_nhan_su";
const KEY_MA_NHAN_SU = "nhac_viec_ma_nhan_su";

let OneSignalRef = null;
let oneSignalReady = false;

const btn = document.getElementById("btnDangKy");
const inputMa = document.getElementById("maNhanSu");

function hienThongBao(text, ok, info) {
  const msg = document.getElementById("msg");
  msg.textContent = text;
  msg.className = info ? "msg info" : (ok ? "msg ok" : "msg err");
}

function taoExternalId() {
  let id = localStorage.getItem(KEY_EXTERNAL_ID);
  if (!id) {
    id = "vanban_" + Date.now() + "_" + Math.random().toString(36).slice(2, 12);
    localStorage.setItem(KEY_EXTERNAL_ID, id);
  }
  return id;
}

function laIPhoneHoacIPad() {
  const ua = navigator.userAgent || "";
  return /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}

function daMoTuManHinhChinh() {
  return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}

function choDenKhiSubscriptionSanSang(OneSignal) {
  return new Promise(function(resolve, reject) {
    const hienTai = {
      id: OneSignal.User.PushSubscription.id || "",
      optedIn: OneSignal.User.PushSubscription.optedIn === true
    };

    if (hienTai.id && hienTai.optedIn) {
      resolve(hienTai);
      return;
    }

    let done = false;

    const handler = function() {
      const moi = {
        id: OneSignal.User.PushSubscription.id || "",
        optedIn: OneSignal.User.PushSubscription.optedIn === true
      };

      if (moi.id && moi.optedIn && !done) {
        done = true;
        try {
          OneSignal.User.PushSubscription.removeEventListener("change", handler);
        } catch (e) {}
        resolve(moi);
      }
    };

    OneSignal.User.PushSubscription.addEventListener("change", handler);

    setTimeout(function() {
      if (!done) {
        const lai = {
          id: OneSignal.User.PushSubscription.id || "",
          optedIn: OneSignal.User.PushSubscription.optedIn === true
        };

        if (lai.id && lai.optedIn) {
          done = true;
          resolve(lai);
        } else {
          reject(new Error("Chưa tạo được mã đăng ký thông báo. Hãy tải lại trang và thử lại."));
        }
      }
    }, 12000);
  });
}

function napOneSignalSDK() {
  window.OneSignalDeferred = window.OneSignalDeferred || [];

  window.OneSignalDeferred.push(async function(OneSignal) {
    try {
      OneSignalRef = OneSignal;

      await OneSignal.init({
        appId: ONESIGNAL_APP_ID,
        safari_web_id: ONESIGNAL_SAFARI_WEB_ID,
        serviceWorkerPath: "/dashboard-van-ban-tanhiep/OneSignalSDKWorker.js",
        serviceWorkerUpdaterPath: "/dashboard-van-ban-tanhiep/OneSignalSDKWorker.js",
        serviceWorkerParam: {
          scope: "/dashboard-van-ban-tanhiep/"
        },
        notifyButton: {
          enable: false
        },
        welcomeNotification: {
          disable: true
        }
      });

      oneSignalReady = true;
      btn.disabled = false;
      btn.textContent = "Đăng ký thiết bị";
      hienThongBao("✅ Hệ thống thông báo đã sẵn sàng. Nhập mã nhân sự để đăng ký.", true);

    } catch (err) {
      oneSignalReady = false;
      btn.disabled = true;
      btn.textContent = "Không thể kết nối";
      hienThongBao("Không khởi tạo được thông báo: " + err.toString(), false);
    }
  });

  const s = document.createElement("script");
  s.src = "https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js";
  s.defer = true;
  s.onerror = function() {
    oneSignalReady = false;
    btn.disabled = true;
    btn.textContent = "Không thể kết nối";
    hienThongBao("Không tải được hệ thống thông báo. Hãy kiểm tra mạng hoặc tắt chặn nội dung/quyền riêng tư nâng cao.", false);
  };
  document.head.appendChild(s);
}

async function dangKyThietBi() {
  const maNhanSu = inputMa.value.trim().toUpperCase();

  if (!maNhanSu) {
    hienThongBao("Vui lòng nhập mã nhân sự.", false);
    inputMa.focus();
    return;
  }

  if (!oneSignalReady || !OneSignalRef) {
    hienThongBao("Hệ thống thông báo chưa sẵn sàng. Vui lòng tải lại trang.", false);
    return;
  }

  if (laIPhoneHoacIPad() && !daMoTuManHinhChinh()) {
    hienThongBao("Trên iPhone/iPad: hãy thêm trang vào Màn hình chính, sau đó mở từ biểu tượng ngoài màn hình rồi đăng ký lại.", false);
    return;
  }

  try {
    btn.disabled = true;
    btn.textContent = "Đang đăng ký...";

    await OneSignalRef.Notifications.requestPermission(true);

    if (typeof Notification !== "undefined" && Notification.permission !== "granted") {
      hienThongBao("Thiết bị chưa cấp quyền thông báo.", false);
      return;
    }

    await OneSignalRef.User.PushSubscription.optIn();

    const sub = await choDenKhiSubscriptionSanSang(OneSignalRef);
    const externalId = taoExternalId();

    await OneSignalRef.login(externalId);

    const payload = {
      action: "dang_ky_thiet_bi",
      maNhanSu: maNhanSu,
      externalId: externalId,
      subscriptionId: sub.id
    };

    const form = new FormData();
    form.append("payload", JSON.stringify(payload));

    const response = await fetch(API_URL, {
  method: "POST",
  body: form
});

const text = await response.text();

if (!text.includes('"ok":true')) {
  hienThongBao("Mã nhân sự không hợp lệ hoặc chưa có trong hệ thống.", false);
  return;
}

localStorage.setItem(KEY_DA_DANG_KY, "1");
localStorage.setItem(KEY_MA_NHAN_SU, maNhanSu);

hienThongBao("✅ Đã đăng ký thiết bị. Đang chuyển về Dashboard...", true);

setTimeout(function() {
  window.location.href = "/dashboard-van-ban-tanhiep/index.html";
}, 1200);

  catch (err) {

    console.error(err);

    hienThongBao(
        "Mã nhân sự không hợp lệ",
        false
    );

} 
  finally {
    btn.disabled = false;
    btn.textContent = "Đăng ký thiết bị";
  }
}

inputMa.addEventListener("input", function() {
  inputMa.value = inputMa.value.toUpperCase().replace(/\s+/g, "");
});

inputMa.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    dangKyThietBi();
  }
});

btn.addEventListener("click", dangKyThietBi);

napOneSignalSDK();
</script>

</body>
</html>
