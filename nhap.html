<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nhập văn bản</title>

  <style>
    :root {
      --main: #1f5f99;
      --main2: #2f80c0;
      --bg: #f3f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --border: #d7dce2;
      --red: #e76f51;
      --green: #4f8a6d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--main), var(--main2));
      color: white;
      text-align: center;
      padding: 18px 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }

    header h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
    }

    header p {
      margin: 7px 0 0;
      font-size: 13.5px;
      opacity: 0.95;
    }

    .container {
      max-width: 760px;
      margin: auto;
      padding: 14px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-weight: bold;
      margin: 14px 0 6px;
      color: var(--main);
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 13px;
      font-size: 15px;
      outline: none;
      background: white;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--main2);
      box-shadow: 0 0 0 3px rgba(47,128,192,0.12);
    }

    .check-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .check-item {
      background: #f7f9fc;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      font-size: 14px;
    }

    .check-item input {
      width: auto;
      margin-right: 6px;
    }

    .btn {
      width: 100%;
      margin-top: 18px;
      border: none;
      background: var(--main);
      color: white;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 14px;
      padding: 13px;
      border-radius: 13px;
      font-weight: bold;
      display: none;
      line-height: 1.45;
    }

    .msg.ok {
      display: block;
      background: #e8f5ee;
      color: var(--green);
      border: 1px solid #b7e1c5;
    }

    .msg.err {
      display: block;
      background: #fff1ed;
      color: var(--red);
      border: 1px solid #f5c2b5;
    }

    .note {
      font-size: 13px;
      color: #6b7280;
      margin-top: 6px;
      line-height: 1.4;
    }

    iframe {
      display: none;
    }

    @media (max-width: 650px) {
      header h1 {
        font-size: 18px;
      }

      .container {
        padding: 12px;
      }

      .check-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>📝 NHẬP VĂN BẢN NHẮC VIỆC</h1>
  <p>Dành cho Văn thư tiếp nhận văn bản và chuyển xử lý</p>
</header>

<div class="container">
  <div class="card">

    <form id="formNhap">

      <label>Mật khẩu văn thư *</label>
      <input type="password" id="matKhau" required placeholder="Nhập mật khẩu">

      <label>Số hiệu văn bản *</label>
      <input type="text" id="soHieu" required placeholder="Ví dụ: 8085/SYT-KHTC">

      <label>File đính kèm *</label>
      <input type="file" id="fileVanBan" required>
      <div class="note">Nên dùng PDF hoặc ảnh scan. Dung lượng khuyến nghị dưới 10MB.</div>

      <label>Trích yếu nội dung *</label>
      <textarea id="trichYeu" required placeholder="Nhập trích yếu nội dung văn bản"></textarea>

      <label>Phòng ban xử lý *</label>
      <div class="check-grid">
        <label class="check-item"><input type="checkbox" name="phongBan" value="PHÒNG TỔ CHỨC - HÀNH CHÍNH">Phòng Tổ chức - Hành chính</label>
        <label class="check-item"><input type="checkbox" name="phongBan" value="PHÒNG KẾ HOẠCH TÀI CHÍNH">Phòng Kế hoạch tài chính</label>
        <label class="check-item"><input type="checkbox" name="phongBan" value="PHÒNG CÔNG TÁC XÃ HỘI">Phòng Công tác xã hội</label>
        <label class="check-item"><input type="checkbox" name="phongBan" value="PHÒNG Y TẾ">Phòng Y tế</label>
        <label class="check-item"><input type="checkbox" name="phongBan" value="KHU I">Khu I</label>
        <label class="check-item"><input type="checkbox" name="phongBan" value="KHU II">Khu II</label>
        <label class="check-item"><input type="checkbox" name="phongBan" value="KHU III">Khu III</label>
      </div>

      <label>Hạn xử lý *</label>
      <input type="date" id="hanXuLy" required>

      <label>Ý kiến chỉ đạo</label>
      <textarea id="yKienChiDao" placeholder="Có thể bỏ trống"></textarea>

      <label>Chỉ đạo khẩn</label>
      <textarea id="chiDaoKhan" placeholder="Có thể bỏ trống"></textarea>

      <button type="submit" class="btn" id="btnGui">📤 Gửi văn bản</button>

      <div id="thongBao" class="msg"></div>

    </form>

    <form id="postForm" method="POST" target="hiddenFrame" style="display:none;">
      <input type="hidden" name="payload" id="payload">
    </form>

    <iframe name="hiddenFrame"></iframe>

  </div>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMINgn39Y_zlvdG9nqMpDH9KeoBKXnR_ueWr_wpVLPu82QxZVPSH4tnkVR9oa7eTJ2KQ/exec";

  const formNhap = document.getElementById("formNhap");
  const postForm = document.getElementById("postForm");
  const payloadInput = document.getElementById("payload");
  const thongBao = document.getElementById("thongBao");
  const btnGui = document.getElementById("btnGui");

  postForm.action = APPS_SCRIPT_URL;

  formNhap.addEventListener("submit", async function(e) {
    e.preventDefault();

    thongBao.className = "msg";
    thongBao.style.display = "none";

    const file = document.getElementById("fileVanBan").files[0];

    if (!file) {
      hienThongBao("Vui lòng chọn file đính kèm.", false);
      return;
    }

    const phongBan = Array
      .from(document.querySelectorAll('input[name="phongBan"]:checked'))
      .map(x => x.value);

    if (phongBan.length === 0) {
      hienThongBao("Vui lòng chọn ít nhất một phòng ban.", false);
      return;
    }

    btnGui.disabled = true;
    btnGui.textContent = "⏳ Đang gửi, vui lòng chờ...";

    try {
      const fileBase64 = await docFileBase64(file);

      const payload = {
        matKhau: document.getElementById("matKhau").value,
        soHieu: document.getElementById("soHieu").value,
        fileName: file.name,
        fileMimeType: file.type,
        fileBase64: fileBase64,
        trichYeu: document.getElementById("trichYeu").value,
        phongBan: phongBan.join(", "),
        hanXuLy: document.getElementById("hanXuLy").value,
        yKienChiDao: document.getElementById("yKienChiDao").value,
        chiDaoKhan: document.getElementById("chiDaoKhan").value
      };

      payloadInput.value = JSON.stringify(payload);
      postForm.submit();

    } catch (err) {
      hienThongBao("Lỗi đọc file: " + err.toString(), false);
      btnGui.disabled = false;
      btnGui.textContent = "📤 Gửi văn bản";
    }
  });

  function docFileBase64(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();

      reader.onload = function() {
        resolve(reader.result);
      };

      reader.onerror = function() {
        reject(reader.error);
      };

      reader.readAsDataURL(file);
    });
  }

  window.addEventListener("message", function(event) {
    const data = event.data || {};

    btnGui.disabled = false;
    btnGui.textContent = "📤 Gửi văn bản";

    if (data.ok) {
      hienThongBao("✅ " + data.message + " Số hiệu: " + data.soHieu, true);
      formNhap.reset();
    } else {
      hienThongBao("⚠️ " + (data.message || "Không gửi được văn bản."), false);
    }
  });

  function hienThongBao(text, ok) {
    thongBao.textContent = text;
    thongBao.className = ok ? "msg ok" : "msg err";
    thongBao.style.display = "block";
  }
</script>

</body>
</html>
